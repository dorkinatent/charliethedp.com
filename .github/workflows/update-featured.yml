name: Update featured video

on:
  schedule:
    - cron: '0 10 * * *' # 6 AM EDT (UTC-4, roughly Mar-Nov)
    - cron: '0 11 * * *' # 6 AM EST (UTC-5, roughly Nov-Mar)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-featured:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rotate featured video and sort grids
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/update-featured.js

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto: rotate featured video to top performer"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pushes made with GITHUB_TOKEN don't trigger the on:push Pages deploy,
      # so dispatch it explicitly.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
