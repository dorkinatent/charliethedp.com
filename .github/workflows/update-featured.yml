name: Update featured video

on:
  schedule:
    - cron: '0 10 * * *' # 6 AM EDT (UTC-4, roughly Mar-Nov)
    - cron: '0 11 * * *' # 6 AM EST (UTC-5, roughly Nov-Mar)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-featured:
    runs-on: ubuntu-latest
    steps:
      # The DEPLOY_KEY secret is a write deploy key: it bypasses the
      # protect-main ruleset, and unlike GITHUB_TOKEN its push triggers
      # the on:push Pages deploy directly.
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rotate featured video and sort grids
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/update-featured.js

      - name: Commit and push if changed
        run: |
          if git diff --quiet index.html; then
            echo "No changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto: rotate featured video to top performer"
            git push
          fi
